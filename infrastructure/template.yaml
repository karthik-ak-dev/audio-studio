AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  RecStudio — Unified Infrastructure
  S3, IAM, DynamoDB, API Gateway, API Lambda, Audio Merger Lambda

# ──────────────────────────────────────────────
# Parameters
# ──────────────────────────────────────────────
Parameters:

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, stage, prod]
    Description: Deployment environment

  DailyApiKey:
    Type: String
    NoEcho: true
    Description: Daily.co API key

  DailyWebhookSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Daily.co webhook HMAC secret

  DailyDomain:
    Type: String
    Description: "Daily.co domain name (e.g. my-domain)"

  FrontendDomain:
    Type: String
    Description: "Frontend domain without protocol (e.g. stage-recstudio.humynlabs.ai) — S3 bucket named to match for CNAME routing"

  FrontendOrigin:
    Type: String
    Description: "Allowed CORS origin (e.g. https://stage-recstudio.humynlabs.ai)"

  MergeDuration:
    Type: String
    Default: "longest"
    AllowedValues: ["longest", "shortest", "first"]
    Description: "Merge duration strategy — longest (pad silence), shortest (truncate), first (match first input)"

# ──────────────────────────────────────────────
# Globals
# ──────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment

# ──────────────────────────────────────────────
# Resources
# ──────────────────────────────────────────────
Resources:

  # ─── S3: Recording Storage ───────────────────
  RecordingsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Environment}-recstudio-recordings-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteRawRecordingsAfter180Days
            Prefix: !Sub "${DailyDomain}/"
            Status: Enabled
            ExpirationInDays: 180
          - Id: MoveProcessedToInfrequentAccess
            Prefix: "processed/"
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 60

  # ─── IAM: Daily.co Cross-Account Role ────────
  DailyRecordingsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-recstudio-daily-role"
      MaxSessionDuration: 43200
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: "arn:aws:iam::291871421005:root"
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                sts:ExternalId: !Ref DailyDomain
      Policies:
        - PolicyName: DailyS3WritePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:PutObject"
                  - "s3:GetObject"
                  - "s3:GetObjectVersion"
                  - "s3:DeleteObject"
                  - "s3:ListBucket"
                  - "s3:ListBucketVersions"
                  - "s3:ListBucketMultipartUploads"
                  - "s3:ListMultipartUploadParts"
                  - "s3:AbortMultipartUpload"
                Resource:
                  - !GetAtt RecordingsBucket.Arn
                  - !Sub "${RecordingsBucket.Arn}/*"

  # ─── S3: Frontend Hosting (Static Website) ──
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref FrontendDomain
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html   # SPA — all routes resolve to index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowPublicRead
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "${FrontendBucket.Arn}/*"
          - Sid: DenyPublicWrite
            Effect: Deny
            Principal: "*"
            Action:
              - "s3:PutObject"
              - "s3:DeleteObject"
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringNotEquals:
                aws:PrincipalAccount: !Ref "AWS::AccountId"
          - Sid: DenyBucketListing
            Effect: Deny
            Principal: "*"
            Action: "s3:ListBucket"
            Resource: !GetAtt FrontendBucket.Arn
            Condition:
              StringNotEquals:
                aws:PrincipalAccount: !Ref "AWS::AccountId"

  # ─── DynamoDB: Sessions Table ────────────────
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${Environment}-recstudio-recording-sessions"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: host_user_id
          AttributeType: S
        - AttributeName: guest_user_id
          AttributeType: S
        - AttributeName: recording_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: HostUserIndex
          KeySchema:
            - AttributeName: host_user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GuestUserIndex
          KeySchema:
            - AttributeName: guest_user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: RecordingIndex
          KeySchema:
            - AttributeName: recording_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ─── DynamoDB: Recordings Table ──────────────────
  RecordingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${Environment}-recstudio-recordings"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: recording_id
          AttributeType: S
        - AttributeName: host_user_id
          AttributeType: S
        - AttributeName: guest_user_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: recording_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: HostUserIndex
          KeySchema:
            - AttributeName: host_user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GuestUserIndex
          KeySchema:
            - AttributeName: guest_user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ─── API Gateway: HTTP API ───────────────────
  RecStudioApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - !Ref FrontendOrigin
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
        AllowHeaders: [Content-Type, Authorization, X-Api-Key]
        MaxAge: 3600

  # ─── Lambda: API (FastAPI + Mangum) ──────────
  ApiFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-recstudio-api"
      Handler: app.handler.handler
      CodeUri: ../api/
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          SESSIONS_TABLE: !Ref SessionsTable
          RECORDINGS_TABLE: !Ref RecordingsTable
          RECORDINGS_BUCKET: !Ref RecordingsBucket
          DAILY_API_KEY: !Ref DailyApiKey
          DAILY_WEBHOOK_SECRET: !Ref DailyWebhookSecret
          DAILY_DOMAIN: !Ref DailyDomain
          FRONTEND_ORIGIN: !Ref FrontendOrigin
          AUDIO_MERGER_FUNCTION_NAME: !Ref AudioMergerFn
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref RecStudioApi
            Path: /{proxy+}
            Method: ANY
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RecordingsTable
        - LambdaInvokePolicy:
            FunctionName: !Ref AudioMergerFn
        - S3ReadPolicy:
            BucketName: !Ref RecordingsBucket

  # ─── Lambda: Audio Merger (zip deploy, static ffmpeg in bin/) ─────
  AudioMergerFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-recstudio-merger"
      Handler: processor.handler.handler
      CodeUri: ../audio-merger/
      Timeout: 900
      MemorySize: 1024
      EphemeralStorage:
        Size: 2048
      Environment:
        Variables:
          RECORDINGS_BUCKET: !Ref RecordingsBucket
          SESSIONS_TABLE: !Ref SessionsTable
          DAILY_DOMAIN: !Ref DailyDomain
          PROCESSED_PREFIX: "processed/"
          MERGE_DURATION: !Ref MergeDuration
      # No Events block — invoked directly by API Lambda via boto3
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref RecordingsBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable

# ──────────────────────────────────────────────
# Outputs
# ──────────────────────────────────────────────
Outputs:

  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${RecStudioApi}.execute-api.${AWS::Region}.amazonaws.com"

  FrontendWebsiteUrl:
    Description: S3 website endpoint (CNAME this in Cloudflare)
    Value: !GetAtt FrontendBucket.WebsiteURL

  FrontendBucketName:
    Description: S3 bucket for frontend static files
    Value: !Ref FrontendBucket

  RecordingsBucketName:
    Description: S3 bucket for raw and processed recordings
    Value: !Ref RecordingsBucket

  RecordingsBucketArn:
    Description: S3 bucket ARN
    Value: !GetAtt RecordingsBucket.Arn

  DailyRecordingsRoleArn:
    Description: IAM role ARN — configure this in Daily.co S3 bucket settings
    Value: !GetAtt DailyRecordingsRole.Arn

  SessionsTableName:
    Description: DynamoDB sessions table name
    Value: !Ref SessionsTable

  RecordingsTableName:
    Description: DynamoDB recordings table name
    Value: !Ref RecordingsTable

  ApiFunctionArn:
    Description: API Lambda function ARN
    Value: !GetAtt ApiFn.Arn

  AudioMergerFunctionArn:
    Description: Audio Merger Lambda function ARN
    Value: !GetAtt AudioMergerFn.Arn


