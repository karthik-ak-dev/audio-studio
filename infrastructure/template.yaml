AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Audio Studio — Unified Infrastructure
  S3, IAM, DynamoDB, API Gateway, API Lambda, Audio Merger Lambda, CloudFront

# ──────────────────────────────────────────────
# Parameters
# ──────────────────────────────────────────────
Parameters:

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, stage, prod]
    Description: Deployment environment

  DailyApiKey:
    Type: String
    NoEcho: true
    Description: Daily.co API key

  DailyWebhookSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Daily.co webhook HMAC secret

  DailyDomain:
    Type: String
    Description: "Daily.co domain name (e.g. my-domain)"

  FrontendOrigin:
    Type: String
    Default: ""
    Description: "Allowed CORS origin — leave empty to auto-use CloudFront URL"

  # TODO: Uncomment when enabling Audio Merger
  # MergeDuration:
  #   Type: String
  #   Default: "longest"
  #   AllowedValues: ["longest", "shortest", "first"]
  #   Description: "Merge duration strategy — longest (pad silence), shortest (truncate), first (match first input)"

# ──────────────────────────────────────────────
# Conditions
# ──────────────────────────────────────────────
Conditions:
  HasCustomFrontendOrigin: !Not [!Equals [!Ref FrontendOrigin, ""]]

# ──────────────────────────────────────────────
# Globals
# ──────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment

# ──────────────────────────────────────────────
# Resources
# ──────────────────────────────────────────────
Resources:

  # ─── S3: Recording Storage ───────────────────
  RecordingsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "audio-studio-recordings-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteRawRecordingsAfter180Days
            Prefix: !Sub "${DailyDomain}/"
            Status: Enabled
            ExpirationInDays: 180
          - Id: MoveProcessedToInfrequentAccess
            Prefix: "processed/"
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 60

  # ─── IAM: Daily.co Cross-Account Role ────────
  DailyRecordingsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "audio-studio-daily-role-${Environment}"
      MaxSessionDuration: 43200
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: "arn:aws:iam::291871421005:root"
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                sts:ExternalId: !Ref DailyDomain
      Policies:
        - PolicyName: DailyS3WritePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:PutObject"
                  - "s3:GetObject"
                  - "s3:DeleteObject"
                  - "s3:ListBucket"
                Resource:
                  - !GetAtt RecordingsBucket.Arn
                  - !Sub "${RecordingsBucket.Arn}/*"

  # ─── S3: Frontend Hosting ───────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "audio-studio-web-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: "s3:GetObject"
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  # ─── CloudFront: CDN ────────────────────────
  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "audio-studio-oac-${Environment}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "audio-studio-cdn-${Environment}"
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_200
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          # SPA — route all 404s to index.html for client-side routing
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  # ─── DynamoDB: Sessions Table ────────────────
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "audio-studio-sessions-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: host_user_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: HostUserIndex
          KeySchema:
            - AttributeName: host_user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ─── API Gateway: HTTP API ───────────────────
  AudioStudioApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - !If
            - HasCustomFrontendOrigin
            - !Ref FrontendOrigin
            - !Sub "https://${FrontendDistribution.DomainName}"
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
        AllowHeaders: [Content-Type, Authorization, X-Api-Key]
        MaxAge: 3600

  # ─── Lambda: API (FastAPI + Mangum) ──────────
  ApiFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "audio-studio-api-${Environment}"
      Handler: app.handler.handler
      CodeUri: ../api/
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          SESSIONS_TABLE: !Ref SessionsTable
          RECORDINGS_BUCKET: !Ref RecordingsBucket
          DAILY_API_KEY: !Ref DailyApiKey
          DAILY_WEBHOOK_SECRET: !Ref DailyWebhookSecret
          DAILY_DOMAIN: !Ref DailyDomain
          FRONTEND_ORIGIN: !If
            - HasCustomFrontendOrigin
            - !Ref FrontendOrigin
            - !Sub "https://${FrontendDistribution.DomainName}"
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref AudioStudioApi
            Path: /{proxy+}
            Method: ANY
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable

  # ─── Lambda Layer: ffmpeg ──────────────────────
  # TODO: Uncomment when enabling Audio Merger
  # FfmpegLayer:
  #   Type: AWS::Serverless::LayerVersion
  #   Properties:
  #     LayerName: !Sub "audio-studio-ffmpeg-${Environment}"
  #     Description: Static ffmpeg binary for arm64 Lambda
  #     ContentUri: ../audio-merger/layers/ffmpeg/
  #     CompatibleRuntimes:
  #       - python3.12
  #     CompatibleArchitectures:
  #       - arm64
  #     RetentionPolicy: Retain

  # ─── Lambda: Audio Merger (ffmpeg) ───────────
  # TODO: Uncomment when enabling Audio Merger
  # AudioMergerFn:
  #   Type: AWS::Serverless::Function
  #   Properties:
  #     FunctionName: !Sub "audio-studio-merger-${Environment}"
  #     Handler: processor.handler.handler
  #     CodeUri: ../audio-merger/
  #     Timeout: 900
  #     MemorySize: 1024
  #     EphemeralStorage:
  #       Size: 2048
  #     Layers:
  #       - !Ref FfmpegLayer
