  #       Variables:
  #         RECORDINGS_BUCKET: !Ref RecordingsBucket
  #         SESSIONS_TABLE: !Ref SessionsTable
  #         DAILY_DOMAIN: !Ref DailyDomain
  #         PROCESSED_PREFIX: "processed/"
  #         MERGE_DURATION: !Ref MergeDuration
  #     Events:
  #       RawTrackUploaded:
  #         Type: S3
  #         Properties:
  #           Bucket: !Ref RecordingsBucket
  #           Events: s3:ObjectCreated:*
  #           Filter:
  #             S3Key:
  #               Rules:
  #                 - Name: prefix
  #                   Value: !Sub "${DailyDomain}/"
  #                 - Name: suffix
  #                   Value: "audio"
  #     Policies:
  #       - S3CrudPolicy:
  #           BucketName: !Ref RecordingsBucket
  #       - DynamoDBCrudPolicy:
  #           TableName: !Ref SessionsTable

# ──────────────────────────────────────────────
# Outputs
# ──────────────────────────────────────────────
Outputs:

  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${AudioStudioApi}.execute-api.${AWS::Region}.amazonaws.com"

  FrontendUrl:
    Description: CloudFront URL for the frontend
    Value: !Sub "https://${FrontendDistribution.DomainName}"

  FrontendBucketName:
    Description: S3 bucket for frontend static files
    Value: !Ref FrontendBucket

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref FrontendDistribution

  RecordingsBucketName:
    Description: S3 bucket for raw and processed recordings
    Value: !Ref RecordingsBucket

  RecordingsBucketArn:
    Description: S3 bucket ARN
    Value: !GetAtt RecordingsBucket.Arn

  DailyRecordingsRoleArn:
    Description: IAM role ARN — configure this in Daily.co S3 bucket settings
    Value: !GetAtt DailyRecordingsRole.Arn

  SessionsTableName:
    Description: DynamoDB sessions table name
    Value: !Ref SessionsTable

  ApiFunctionArn:
    Description: API Lambda function ARN
    Value: !GetAtt ApiFn.Arn

  # TODO: Uncomment when enabling Audio Merger
  # AudioMergerFunctionArn:
  #   Description: Audio Merger Lambda function ARN
  #   Value: !GetAtt AudioMergerFn.Arn


