# SAM CLI deploy configuration
# Usage: cd infrastructure && sam deploy
#
# Stage deploy:
#   sam deploy --config-env stage --parameter-overrides \
#     DailyApiKey=xxx DailyWebhookSecret=xxx

version = 0.1

[default.deploy.parameters]
stack_name = "dev-recstudio"
region = "ap-south-1"
resolve_s3 = true
capabilities = "CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = true

parameter_overrides = [
  "Environment=dev",
  "DailyDomain=ak-kgen",
  "FrontendDomain=localhost",
  "FrontendOrigin=http://localhost:5173",
]

# Secrets — pass these at deploy time:
#   sam deploy --parameter-overrides \
#     DailyApiKey=xxx \
#     DailyWebhookSecret=xxx

[default.build.parameters]
use_container = false

[stage.deploy.parameters]
stack_name = "stage-recstudio"
region = "ap-south-1"
resolve_s3 = true
capabilities = "CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = true

parameter_overrides = [
  "Environment=stage",
  "DailyDomain=stage-kgen",
  "FrontendDomain=stage-recstudio.humynlabs.ai",
  "FrontendOrigin=https://stage-recstudio.humynlabs.ai",
]

# Secrets — pass at deploy time:
#   sam deploy --config-env stage --parameter-overrides \
#     DailyApiKey=xxx DailyWebhookSecret=xxx

[stage.build.parameters]
use_container = false

[prod.deploy.parameters]
stack_name = "prod-recstudio"
region = "ap-south-1"
resolve_s3 = true
capabilities = "CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = true

parameter_overrides = [
  "Environment=prod",
  "DailyDomain=ak-kgen",
  "FrontendDomain=recstudio.humynlabs.ai",
  "FrontendOrigin=https://recstudio.humynlabs.ai",
]

[prod.build.parameters]
use_container = false
