# ──────────────────────────────────────────────
# Audio Recording Platform — Local Development
# ──────────────────────────────────────────────
#
# Usage:
#   Set DAILY_API_KEY in api environment below
#   docker compose up            # start everything
#   docker compose up -d         # start in background
#   docker compose down          # stop everything
#   docker compose logs -f api   # tail API logs
#
# Services:
#   dynamodb  — DynamoDB Local on port 8000
#   dynamodb-admin — DynamoDB admin UI on port 8001
#   dynamodb-setup — one-shot: creates the sessions table
#   api       — FastAPI via uvicorn on port 3001
#   web       — Vite dev server on port 5173

services:

  # ─── DynamoDB Local ──────────────────────────
  dynamodb:
    image: amazon/dynamodb-local
    container_name: audio-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/shell/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── DynamoDB Admin UI ───────────────────────
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: audio-dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: http://dynamodb:8000
      AWS_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    depends_on:
      dynamodb:
        condition: service_healthy

  # ─── DynamoDB Table Setup (one-shot) ─────────
  dynamodb-setup:
    image: amazon/aws-cli
    container_name: audio-dynamodb-setup
    depends_on:
      dynamodb:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: ap-south-1
    entrypoint: /bin/sh
    command:
      - -c
      - |
        aws dynamodb describe-table \
          --table-name audio-studio-sessions-dev \
          --endpoint-url http://dynamodb:8000 2>/dev/null && \
          echo "Table already exists" && exit 0

        aws dynamodb create-table \
          --table-name audio-studio-sessions-dev \
          --attribute-definitions \
            AttributeName=session_id,AttributeType=S \
            AttributeName=status,AttributeType=S \
            AttributeName=created_at,AttributeType=S \
            AttributeName=host_user_id,AttributeType=S \
          --key-schema AttributeName=session_id,KeyType=HASH \
          --global-secondary-indexes \
            '[{"IndexName":"StatusIndex","KeySchema":[{"AttributeName":"status","KeyType":"HASH"},{"AttributeName":"created_at","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}},{"IndexName":"HostUserIndex","KeySchema":[{"AttributeName":"host_user_id","KeyType":"HASH"},{"AttributeName":"created_at","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb:8000

        echo "Table audio-studio-sessions-dev created"

  # ─── API (FastAPI + uvicorn) ─────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: audio-api
    ports:
      - "3001:3001"
    volumes:
      - ./api/app:/app/app
    environment:
      SESSIONS_TABLE: audio-studio-sessions-dev
      RECORDINGS_BUCKET: auto-order-reports-prod
      DAILY_API_KEY: your-daily-api-key-here  # ← replace with your key
      DAILY_WEBHOOK_SECRET: ""
      DAILY_DOMAIN: ak-kgen
      ENVIRONMENT: dev
      FRONTEND_ORIGIN: http://localhost:5173
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      AUDIO_MERGER_ENDPOINT: http://audio-merger:3002/process
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: ap-south-1
    depends_on:
      dynamodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3001/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Audio Merger (local HTTP wrapper) ────────
  audio-merger:
    build:
      context: ./audio-merger
      dockerfile: Dockerfile
    container_name: audio-merger
    ports:
      - "3002:3002"
    volumes:
      - ./audio-merger/processor:/app/processor
      - ./audio-merger/local_server.py:/app/local_server.py
      - ~/.aws:/root/.aws:ro
    environment:
      RECORDINGS_BUCKET: ${RECORDINGS_BUCKET:-auto-order-reports-prod}
      SESSIONS_TABLE: audio-studio-sessions-dev
      DAILY_DOMAIN: ak-kgen
      PROCESSED_PREFIX: ""
      MERGE_DURATION: longest
      ENVIRONMENT: dev
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      FFMPEG_PATH: /usr/bin/ffmpeg
      AWS_DEFAULT_REGION: ap-south-1
    depends_on:
      dynamodb:
        condition: service_healthy

  # ─── Web (Vite dev server) ───────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: audio-web
    ports:
      - "5173:5173"
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
      - ./web/tailwind.config.ts:/app/tailwind.config.ts
      - ./web/postcss.config.js:/app/postcss.config.js
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_healthy
